<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV - Samir Medjaher</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
    @page { size: A4; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --ink: #1f2a37;
        --blue: #2274b8;
        --blue-bright: #2b8fd0;
        --green: #2f9e44;
        --muted: #4b5563;
        --soft: #6b7280;
        --line: #d8dee6;
        --line-soft: #e8edf2;
    }
    html, body { background: #fff; }
    body {
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        color: var(--ink);
        font-size: 9.4px;
        line-height: 1.45;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    .sheet {
        width: 210mm; min-height: 297mm;
        padding: 12mm 13mm;
        margin: 0 auto;
    }

    /* ---------- Header ---------- */
    .header {
        display: flex; align-items: center; gap: 20px;
        border-bottom: 3px solid var(--blue);
        padding-bottom: 12px; margin-bottom: 12px;
    }
    .photo-ring {
        flex: 0 0 auto;
        width: 104px; height: 104px; border-radius: 50%;
        padding: 3px;
        background: linear-gradient(135deg, var(--blue-bright) 0%, var(--green) 100%);
        display: flex;
    }
    .photo-ring img {
        width: 100%; height: 100%; border-radius: 50%;
        object-fit: cover; border: 2.5px solid #fff;
    }
    .header-text { flex: 1; text-align: center; }
    .header-text h1 { font-size: 27px; font-weight: 700; color: var(--ink); letter-spacing: .3px; }
    .header-text .role { font-size: 14px; color: var(--blue-bright); font-weight: 600; margin-top: 2px; }
    .contact {
        margin-top: 8px;
        display: flex; flex-wrap: wrap; justify-content: center;
        gap: 4px 16px; font-size: 9.4px; color: var(--muted);
    }
    .contact .ci { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    .contact svg { width: 12px; height: 12px; stroke: var(--blue); fill: none; flex: 0 0 auto; }

    /* ---------- Sections ---------- */
    .sec-title {
        font-size: 14px; font-weight: 700; color: var(--ink);
        padding-bottom: 3px; border-bottom: 1px solid var(--line);
        margin-bottom: 7px;
    }
    section { margin-bottom: 12px; }
    .profil { margin-bottom: 13px; }
    .profil p { color: var(--muted); text-align: justify; font-size: 9.6px; line-height: 1.55; }

    .cols { display: grid; grid-template-columns: 0.92fr 1.32fr; gap: 24px; }

    /* ---------- Left column ---------- */
    .skillgroup { margin-bottom: 6px; }
    .skillgroup h3 { font-size: 10px; font-weight: 700; color: var(--green); margin-bottom: 1px; }
    .skillgroup p { color: var(--muted); }

    .lang-line {
        display: flex; justify-content: space-between; align-items: baseline;
        padding: 3px 0; border-bottom: 1px solid var(--line-soft);
    }
    .lang-line b { color: var(--ink); font-weight: 600; }
    .lang-line span { color: var(--blue); font-weight: 600; }

    .intl-item { margin-bottom: 6px; }
    .intl-item b { color: var(--ink); font-weight: 700; }
    .intl-item .y { color: var(--blue); font-weight: 600; font-size: 8.8px; }
    .intl-item .d { color: var(--muted); }

    /* ---------- Right column items ---------- */
    .item { margin-bottom: 9px; padding-left: 11px; border-left: 2.5px solid var(--blue); }
    .item .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .item .title { font-size: 10.6px; font-weight: 700; color: var(--ink); }
    .item .date { font-size: 8.8px; color: var(--blue); font-weight: 600; white-space: nowrap; }
    .item .sub { font-size: 9.4px; color: var(--blue); font-weight: 500; margin: 1px 0 2px; }
    .item .desc { color: var(--muted); }

    /* ---------- Project cards ---------- */
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; }
    .card { border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; }
    .card h4 { font-size: 10px; font-weight: 700; color: var(--ink); margin-bottom: 3px; line-height: 1.25; }
    .card p { font-size: 8.9px; color: var(--muted); line-height: 1.4; }
    .card .tags { font-size: 8.6px; color: var(--blue); font-weight: 600; margin-top: 5px; }

    footer { margin-top: 12px; text-align: center; font-size: 7.6px; color: #9ca3af; }
</style>
</head>
